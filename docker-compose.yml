services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chesslens
      POSTGRES_USER: chesslens
      POSTGRES_PASSWORD: chesslens
    volumes:
      - chesslens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chesslens -d chesslens"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chesslens:
    build: .
    image: chesslens
    # init_db() in the lifespan already runs alembic upgrade head on startup —
    # running it again here via CLI deadlocks the second invocation.
    command: uvicorn chesslens.delivery.api:app --host 0.0.0.0 --port 8000 --workers 1
    env_file:
      - path: .env
        required: false
    environment:
      CHESSLENS_DATABASE_URL: postgresql+psycopg://chesslens:chesslens@postgres:5432/chesslens
      CHESSLENS_MODEL: ${CHESSLENS_MODEL:-gemini/gemini-2.5-pro}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./reports:/app/reports               # generated HTML reports
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chesslens_pgdata:
