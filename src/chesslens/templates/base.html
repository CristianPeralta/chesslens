<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}chesslens{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='43' stroke='%2381b64c' stroke-width='8' fill='none'/><text x='50' y='70' font-size='52' text-anchor='middle' fill='%2381b64c'>♟</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 900px; margin: 0 auto; }

    h1 { font-size: 2rem; font-weight: 700; }
    h2 { font-size: 1.25rem; font-weight: 600; color: #a0a0a0; margin-bottom: 1rem; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
      h1 { font-size: 1.5rem; }
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-green  { background: #14532d; color: #4ade80; }
    .badge-red    { background: #450a0a; color: #f87171; }
    .badge-yellow { background: #451a03; color: #fbbf24; }
    .badge-blue   { background: #1e3a5f; color: #60a5fa; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #a0a0a0; font-size: 0.9rem; }
    .stat-value { font-weight: 600; }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .site-header a { color: #81b64c; text-decoration: none; font-weight: 700; font-size: 1.1rem; }
    .switch-user {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .switch-user:hover { color: #f0f0f0; border-color: #555; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a href="/">chesslens</a>
      <button class="switch-user" onclick="switchUser()">Switch user</button>
    </header>
    {% block content %}{% endblock %}
  </div>
  <script>
    function switchUser() {
      localStorage.removeItem('chess_username');
      document.cookie = 'chess_username=; path=/; max-age=0';
      location.href = '/';
    }
  </script>
</body>
</html>
