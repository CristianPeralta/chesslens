<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chesslens</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='43' stroke='%2381b64c' stroke-width='8' fill='none'/><text x='50' y='70' font-size='52' text-anchor='middle' fill='%2381b64c'>♟</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f0f0f0;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .logo span { color: #81b64c; }

    .tagline {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2.5rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.85rem 1rem;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0.75rem;
    }

    input[type="text"]:focus { border-color: #81b64c; }
    input[type="text"]::placeholder { color: #555; }

    button {
      width: 100%;
      padding: 0.85rem;
      background: #81b64c;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #6fa03d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">chess<span>lens</span></div>
    <p class="tagline">Your personal chess coach, powered by Stockfish</p>
    <form id="f">
      <input id="u" type="text" placeholder="your chess.com username" required autofocus>
      <button type="submit">Analyze my games →</button>
    </form>
  </div>
  <script>
    const stored = localStorage.getItem('chess_username');
    if (stored) {
      document.cookie = 'chess_username=' + stored + '; path=/';
      location.href = '/games';
    }
    document.getElementById('f').onsubmit = function(e) {
      e.preventDefault();
      const u = document.getElementById('u').value.trim();
      if (!u) return;
      localStorage.setItem('chess_username', u);
      document.cookie = 'chess_username=' + u + '; path=/';
      location.href = '/games';
    };
  </script>
</body>
</html>
