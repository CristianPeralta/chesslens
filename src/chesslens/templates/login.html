<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>chesslens · login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='43' stroke='%2381b64c' stroke-width='8' fill='none'/><text x='50' y='70' font-size='52' text-anchor='middle' fill='%2381b64c'>♟</text></svg>">
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a2e; color: #eee; }
    form { background: #16213e; padding: 2rem; border-radius: 8px; display: flex; flex-direction: column; gap: 1rem; min-width: 300px; }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    input { padding: 0.5rem; border-radius: 4px; border: 1px solid #444; background: #0f3460; color: #eee; font-size: 1rem; }
    button { padding: 0.6rem; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .error { color: #e94560; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>
  <form id="form">
    <h1>chesslens</h1>
    <input type="email" id="email" placeholder="Email" required autofocus>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <span class="error" id="err"></span>
  </form>
  <script>
    document.getElementById("form").addEventListener("submit", async e => {
      e.preventDefault();
      const res = await fetch("/auth/web-login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: document.getElementById("email").value, password: document.getElementById("password").value }),
        redirect: "follow",
      });
      if (res.ok || res.redirected) {
        window.location.href = res.url || "/game/last";
      } else {
        const err = document.getElementById("err");
        err.style.display = "block";
        err.textContent = "Invalid credentials";
      }
    });
  </script>
</body>
</html>
